name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npx electron-rebuild
      - run: npm run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npx electron-rebuild
      - run: npm run build:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.AppImage

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npx electron-rebuild
      - run: npm run build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

  release:
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/windows
      - uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist/linux
      - uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: dist/mac
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*.exe
            dist/linux/*.AppImage
            dist/mac/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

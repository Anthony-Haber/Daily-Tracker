<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' file: blob:; font-src 'self' file:;" />
  <title>Focus — Daily Tracker</title>
  <link id="theme-stylesheet" rel="stylesheet" href="../../themes/default/theme.css" />
  <link rel="stylesheet" href="../../ship-log/ship-log.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="../../theme-loader.js"></script>
  <script src="../../ship-log/ship-log.js"></script>
  <script src="../../sounds/sound-player.js"></script>
  <style>
    .task-card-handle {
      color: var(--text-light);
      cursor: grab;
      font-size: 15px;
      flex-shrink: 0;
      user-select: none;
      line-height: 1;
      padding-right: 2px;
    }
    .task-card-handle:active { cursor: grabbing; }
    .task-card.dragging      { opacity: 0.35; }
    .task-card.drop-above    { border-top: 2px solid var(--accent); }
    .task-card.drop-below    { border-bottom: 2px solid var(--accent); }

    /* ── Dev panel ───────────────────────────────────────────────────────────── */
    #dev-panel {
      background: #1a0000;
      border: 2px solid #ff3030;
      border-radius: 6px;
      margin: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #ff9999;
    }
    .dev-panel-label {
      font-weight: bold;
      font-size: 11px;
      letter-spacing: 0.5px;
      color: #ff3030;
      margin-bottom: 6px;
    }
    .dev-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }
    .dev-row label { font-size: 11px; white-space: nowrap; }
    .dev-row input[type="number"] {
      width: 64px;
      padding: 2px 4px;
      font-size: 11px;
      background: #2a0000;
      border: 1px solid #ff3030;
      color: #ff9999;
      border-radius: 3px;
    }
    .dev-row select {
      font-size: 11px;
      background: #2a0000;
      border: 1px solid #ff3030;
      color: #ff9999;
      border-radius: 3px;
      padding: 2px 4px;
    }
    .dev-row button {
      font-size: 11px;
      padding: 2px 8px;
      background: #3a0000;
      border: 1px solid #ff3030;
      color: #ff9999;
      border-radius: 3px;
      cursor: pointer;
    }
    .dev-row button:hover { background: #550000; }
  </style>
</head>
<body>

    <!-- ── Mode tabs ────────────────────────────────────────────────────────── -->
    <div class="tab-bar">
      <button class="tab active" data-mode="pomodoro"     data-minutes="25">Pomodoro</button>
      <button class="tab"        data-mode="short-break"  data-minutes="5">Short Break</button>
      <button class="tab"        data-mode="long-break"   data-minutes="15">Long Break</button>
    </div>

    <!-- ── Timer ────────────────────────────────────────────────────────────── -->
    <section class="timer-section">
      <div class="timer-display" id="timer-display">25:00</div>
      <div class="session-counter">
        <span id="session-count">0</span> pomodoro<span id="session-plural">s</span> today
      </div>
      <div id="task-active-label" class="task-active-label" hidden></div>
    </section>

    <!-- ── Controls ─────────────────────────────────────────────────────────── -->
    <div class="controls">
      <button id="btn-skip"   class="btn btn-ghost btn-sm">Skip</button>
      <button id="btn-start"  class="btn btn-primary">Start</button>
    </div>

    <!-- ── Task area ─────────────────────────────────────────────────────────── -->
    <section class="task-section">
      <div class="section-heading task-section-label">In Progress</div>
      <ul class="inprogress-list" id="inprogress-list">
        <li class="task-empty" id="inprogress-empty">No tasks in progress</li>
      </ul>
      <div class="add-task-row">
        <button id="btn-add-task" class="btn btn-ghost btn-sm">+ Add Task</button>
        <div class="pending-dropdown" id="pending-dropdown" hidden>
          <ul class="pending-list" id="pending-list"></ul>
          <div class="pending-empty" id="pending-empty" hidden>No pending tasks</div>
        </div>
      </div>
    </section>

    <!-- ── Session log ───────────────────────────────────────────────────────── -->
    <section class="log-section">
      <div class="section-heading">Today's Sessions</div>
      <ul class="session-log" id="session-log">
        <li class="log-empty" id="log-empty">No sessions yet — start your first pomodoro!</li>
      </ul>
    </section>

    <!-- ── Music player ──────────────────────────────────────────────────────── -->
    <section class="music-section" id="music-section">
      <button class="music-toggle" id="music-toggle">
        <span>🎵 Music</span>
        <span class="music-toggle-arrow" id="music-toggle-arrow">▶</span>
      </button>
      <div class="music-body" id="music-body" hidden>
        <div class="music-now-playing" id="music-now-playing" hidden>
          <span class="music-note">♪</span>
          <span id="music-track-name" class="music-track-name">—</span>
        </div>
        <div class="music-controls">
          <button id="music-play-pause" class="btn btn-ghost btn-sm" disabled>▶ Play</button>
          <button id="music-skip"       class="btn btn-ghost btn-sm" disabled>⏭ Skip</button>
          <label class="music-volume-label">
            <span>🔊</span>
            <input type="range" id="music-volume" min="0" max="1" step="0.05" value="0.7" class="music-volume-slider" />
          </label>
        </div>
        <ul class="music-playlist" id="music-playlist"></ul>
        <div class="music-upload-row">
          <div class="music-pool-select">
            <button class="music-pool-btn active" data-pool="focus">Focus</button>
            <button class="music-pool-btn"        data-pool="break">Break</button>
          </div>
          <button id="music-upload" class="btn btn-ghost btn-sm">+ Upload</button>
          <input type="file" id="music-file-input" accept="audio/*" multiple style="display:none" />
        </div>
      </div>
      <audio id="music-audio"></audio>
    </section>

  <!-- ── Dev panel (hidden; renderer.js shows it only in dev mode) ──────────── -->
  <section id="dev-panel" style="display:none">
    <div class="dev-panel-label">🛠 DEV TOOLS</div>
    <div class="dev-row">
      <label for="dev-timer-input">Set timer (seconds)</label>
      <input type="number" id="dev-timer-input" value="5" min="0" />
      <button id="dev-set-timer-btn">Set</button>
    </div>
    <div class="dev-row">
      <button id="dev-force-pomo">▶ Force Complete</button>
      <button id="dev-force-break">☕ Force Break End</button>
    </div>
    <div class="dev-row">
      <label for="dev-sound-select">🔊 Test Sound</label>
      <select id="dev-sound-select">
        <option value="checkin">checkin</option>
        <option value="meal-log">meal-log</option>
        <option value="finance-log">finance-log</option>
        <option value="reflection">reflection</option>
        <option value="pomo-complete">pomo-complete</option>
        <option value="close">close</option>
        <option value="startup">startup</option>
        <option value="ship-log">ship-log</option>
      </select>
      <button id="dev-sound-play">Play</button>
    </div>
  </section>

  <script src="renderer.js"></script>
</body>
</html>
